log_format upstreamlog '$remote_addr - '
                        '"$request" $status '
                        'upstream: $upstream_addr '
                        'response_time: $upstream_response_time ';
access_log /var/log/nginx/access.log upstreamlog;

server {
    listen 80;

    location /fastapi/ {
        rewrite ^/fastapi/(.*)$ /$1 break;
        proxy_pass http://fastapi-app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /django/ {
        rewrite ^/django/(.*)$ /$1 break;
        proxy_pass http://django-app:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /node/ {
        rewrite ^/node/(.*)$ /$1 break;
        proxy_pass http://node-app:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /dotnet/ {
        rewrite ^/dotnet/(.*)$ /$1 break;
        proxy_pass http://dotnet-app:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/health {
        proxy_pass http://fastapi-app:8000/health;
        proxy_set_header Host $host;
    }
}