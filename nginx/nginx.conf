# Round robin pool
upstream backend_pool {
    server fastapi-app:8000;
    server django-app:8001;
    server node-app:8002;
    server dotnet-app:8003;
}

server {
    listen 80;

    # Path-based direct access (your sir's requirement) ✅
    location /fastapi/ {
        rewrite ^/fastapi/(.*)$ /$1 break;
        proxy_pass http://fastapi-app:8000;
    }

    location /django/ {
        rewrite ^/django/(.*)$ /$1 break;
        proxy_pass http://django-app:8001;
    }

    location /node/ {
        rewrite ^/node/(.*)$ /$1 break;
        proxy_pass http://node-app:8002;
    }

    location /dotnet/ {
        rewrite ^/dotnet/(.*)$ /$1 break;
        proxy_pass http://dotnet-app:8003;
    }

    # Round robin for frontend (/api/ route) ✅
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://backend_pool;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
        add_header X-Served-By $upstream_addr;
    }
}