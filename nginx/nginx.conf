log_format upstreamlog '$remote_addr - "$request" $status '
                       'upstream: $upstream_addr '
                       'response_time: $upstream_response_time';

access_log /var/log/nginx/access.log upstreamlog;

upstream fastapi_backend {
    server fastapi:8000;
}

upstream django_backend {
    server django:8001;
}

upstream node_backend {
    server node:8002;
}

upstream dotnet_backend {
    server dotnet:8003;
}

upstream roundrobin_backend {
    server fastapi:8000;
    server django:8001;
    server node:8002;
    server dotnet:8003;
}

server {
    listen 80;

    location /fastapi/ {
        rewrite ^/fastapi/(.*)$ /$1 break;
        proxy_pass http://fastapi_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /django/ {
        rewrite ^/django/(.*)$ /$1 break;
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /node/ {
        rewrite ^/node/(.*)$ /$1 break;
        proxy_pass http://node_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /dotnet/ {
        rewrite ^/dotnet/(.*)$ /$1 break;
        proxy_pass http://dotnet_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://roundrobin_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
        add_header X-Served-By $upstream_addr;
    }

    # Grafana
    location /grafana/ {
        proxy_pass http://grafana:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Prometheus
    location /prometheus/ {
        rewrite ^/prometheus/(.*)$ /$1 break;
        proxy_pass http://prometheus:9090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Alertmanager
    location /alertmanager/ {
        rewrite ^/alertmanager/(.*)$ /$1 break;
        proxy_pass http://alertmanager:9093;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # cAdvisor
    location /cadvisor/ {
        rewrite ^/cadvisor/(.*)$ /$1 break;
        proxy_pass http://cadvisor:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}