services:

  fastapi:
    image: asia-south1-docker.pkg.dev/linux-box-1-492217/capstone-registry/fastapi:latest
    container_name: fastapi-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on: []
    networks:
      - my-net

  django:
    image: asia-south1-docker.pkg.dev/linux-box-1-492217/capstone-registry/django:latest
    container_name: django-app
    ports:
      - "8001:8001"
    env_file:
      - .env
    depends_on: []
    networks:
      - my-net

  node:
    image: asia-south1-docker.pkg.dev/linux-box-1-492217/capstone-registry/node:latest
    container_name: node-app
    ports:
      - "8002:8002"
    env_file:
      - .env
    depends_on: []
    networks:
      - my-net

  dotnet:
    image: asia-south1-docker.pkg.dev/linux-box-1-492217/capstone-registry/dotnet:latest
    container_name: dotnet-app
    ports:
      - "8003:8003"
    env_file:
      - .env
    depends_on: []
    networks:
      - my-net

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - fastapi
      - django
      - node
      - dotnet
    networks:
      - my-net

networks:
  my-net: