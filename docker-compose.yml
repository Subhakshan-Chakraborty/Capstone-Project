services:

  fastapi:
    image: asia-south1-docker.pkg.dev/linux-box-1-492217/capstone-registry/fastapi:51
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_PORT=${DB_PORT}
    depends_on: []
    networks:
      - my-net

  django:
    image: asia-south1-docker.pkg.dev/linux-box-1-492217/capstone-registry/django:50
    ports:
      - "8001:8001"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_PORT=${DB_PORT}
    depends_on: []
    networks:
      - my-net

  node:
    image: asia-south1-docker.pkg.dev/linux-box-1-492217/capstone-registry/node:50
    ports:
      - "8002:8002"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_PORT=${DB_PORT}
    depends_on: []
    networks:
      - my-net

  dotnet:
    image: asia-south1-docker.pkg.dev/linux-box-1-492217/capstone-registry/dotnet:50
    ports:
      - "8003:8003"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_PORT=${DB_PORT}
    depends_on: []
    networks:
      - my-net

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - fastapi
      - django
      - node
      - dotnet
    networks:
      - my-net

networks:
  my-net: