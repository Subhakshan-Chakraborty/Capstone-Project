global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'webhook-receiver'
  
  routes:
    - match:
        severity: critical
      receiver: critical-receiver
      group_wait: 5s
      repeat_interval: 30m
      
    - match:
        severity: warning
      receiver: warning-receiver
      group_wait: 30s
      repeat_interval: 2h

receivers:
  - name: 'webhook-receiver'
    webhook_configs:
      - url: 'http://localhost:9093/webhook'
        send_resolved: true

  - name: 'critical-receiver'
    webhook_configs:
      - url: 'http://localhost:9093/webhook'
        send_resolved: true

  - name: 'warning-receiver'
    webhook_configs:
      - url: 'http://localhost:9093/webhook'
        send_resolved: true